name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v4

      - name: Upload Frontend Artifact Directory
        uses: actions/upload-pages-artifact@v3
        with:
          # Tells GitHub to only publish the HTML files inside your frontend folder
          path: './frontend'

      - name: Deploy to GitHub Pages Live Host
        id: deployment
        uses: actions/deploy-pages@v4
