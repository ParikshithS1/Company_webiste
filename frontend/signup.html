<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Registration Interface Pipeline</title>
 <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="cloudflare.com">
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="bg-white border border-gray-200 max-w-md w-full rounded-2xl p-8 shadow-2xl space-y-6">
    <div class="text-center space-y-1">
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Create Profile Account</h1>
      <p class="text-sm text-slate-400 font-medium">Join the systemic operations tracking grid infrastructure.</p>
    </div>

    <form id="signupForm" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Full Name Matrix</label>
        <input type="text" id="regName" required class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Email Coordinates Address</label>
        <input type="email" id="regEmail" required class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Security Verification Code (Password)</label>
        <input type="password" id="regPassword" required class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
      </div>
      
      <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-sm hover:bg-blue-700 transition-colors shadow-md flex items-center justify-center gap-2">
        Execute Database Sync <i class="fa-solid fa-database text-xs text-blue-200"></i>
      </button>
    </form>

    <div class="text-center text-xs border-t border-gray-100 pt-4 font-medium">
      <a href="index.html" class="text-slate-400 hover:text-slate-600 transition-colors">Cancel Profile Instantiation</a>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        fullName: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value
      };

      try {
        const response = await fetch('http://localhost:5000/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          alert('Sign Up Successful! Redirecting automatically back to home interface...');
          // Enforce automatic redirection back to Home view as explicitly requested
          window.location.href = 'index.html';
        } else {
          alert('Error executing parameter build: ' + data.error);
        }
      } catch (err) {
        alert('Failed execution sequence connection block error.');
      }
    });
  </script>
</body>
</html>
