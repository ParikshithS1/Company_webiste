<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identity Authentication System Login</title>
 <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="cloudflare.com">
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="bg-white border border-gray-200 max-w-md w-full rounded-2xl p-8 shadow-2xl space-y-6">
    <div class="text-center space-y-1">
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Identity Authentication</h1>
      <p class="text-sm text-slate-400 font-medium">Log into the account registered in the database grid.</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Email Coordinate Address</label>
        <input type="email" id="logEmail" required class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Security Code (Password)</label>
        <input type="password" id="logPassword" required class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
      </div>
      
      <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl text-sm hover:bg-blue-600 transition-all shadow-md flex items-center justify-center gap-2">
        Authorize Verification Check <i class="fa-solid fa-shield-halved text-xs text-slate-400"></i>
      </button>
    </form>

    <div class="text-center text-xs border-t border-gray-100 pt-4 font-medium">
      <p class="text-slate-400">No profile track? <a href="signup.html" class="text-blue-500 hover:underline">Register Account Instance</a></p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        email: document.getElementById('logEmail').value,
        password: document.getElementById('logPassword').value
      };

      try {
        const response = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          // Store active profile data validation state tokens securely in native local cache tracking layers
          localStorage.setItem('officeUser', JSON.stringify(data.user));
          alert('Authorization Verified! Returning back to dashboard matrix...');
          window.location.href = 'index.html';
        } else {
          alert('Validation mismatch parameter fail: ' + data.error);
        }
      } catch (err) {
        alert('Authorization processing tracking error connection block.');
      }
    });
  </script>
</body>
</html>
