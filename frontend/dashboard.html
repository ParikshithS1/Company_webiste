<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corporate Careers - Active Job Openings</title>
<script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="cloudflare.com">
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex flex-col min-h-screen">

  <nav class="bg-slate-900 text-white px-8 py-4 flex justify-between items-center shadow-md">
    <div class="text-xl font-black text-blue-500"><a href="index.html">OfficeCorp</a></div>
    <div class="flex gap-6 font-semibold text-sm">
      <a href="index.html" class="hover:text-blue-400 transition-colors">← Back to Workspace Home</a>
    </div>
  </nav>

  <main class="flex-grow max-w-4xl w-full mx-auto py-12 px-6 space-y-8">
    <div class="border-b border-gray-200 pb-4">
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Active Career Openings</h1>
      <p class="text-slate-500 text-sm mt-1">Browse live opportunities pulled instantly from our active MongoDB database instances.</p>
    </div>

    <!-- Dynamic Container Node targeted by JavaScript Render Loops -->
    <div id="jobsGrid" class="space-y-4">
      <div class="text-center py-12 text-slate-400 font-medium animate-pulse">
        <i class="fa-solid fa-spinner fa-spin text-2xl mb-2 block text-blue-500"></i>
        Interrogating backend storage clusters for open lines...
      </div>
    </div>
  </main>

  <footer class="bg-slate-900 text-slate-500 p-6 text-center text-xs font-mono border-t border-slate-800 mt-auto">
    <p>Operational data pipeline active connection monitoring: <span class="text-blue-400">info@officecorp.com</span></p>
  </footer>

  <script>
    async function executeLiveFetch() {
      const grid = document.getElementById('jobsGrid');
      try {
        const response = await fetch('http://localhost:5000/api/jobs');
        const data = await response.json();
        grid.innerHTML = '';

        if (data.length === 0) {
          grid.innerHTML = `
            <div class="bg-amber-50 border border-amber-200 text-amber-800 p-6 rounded-xl text-center shadow-sm">
              <i class="fa-solid fa-triangle-exclamation text-2xl mb-2 block text-amber-500"></i>
              No entries found inside the collection. Run the seed endpoint <a href="http://localhost:5000/api/jobs/seed" target="_blank" class="underline font-bold text-blue-600">/api/jobs/seed</a> to build mock parameters.
            </div>`;
          return;
        }

        data.forEach(job => {
          const card = document.createElement('div');
          card.className = "bg-white border border-gray-200 rounded-xl p-6 shadow-sm hover:shadow-md transition-all duration-200";
          card.innerHTML = `
            <div class="flex justify-between items-start gap-4 mb-2">
              <h3 class="text-xl font-bold text-slate-900 tracking-tight">\${job.title}</h3>
              <span class="bg-blue-50 text-blue-700 font-bold text-xs px-3 py-1 rounded-full border border-blue-100 flex items-center gap-1">
                <i class="fa-solid fa-location-dot text-blue-400"></i> \${job.location}
              </span>
            </div>
            <p class="text-xs font-extrabold text-slate-400 uppercase tracking-widest mb-3">\${job.department}</p>
            <p class="text-slate-600 text-sm leading-relaxed">\${job.description}</p>
            <button class="mt-4 bg-slate-900 text-white font-bold text-xs tracking-wide px-5 py-2.5 rounded-lg hover:bg-blue-600 transition-colors shadow-sm">
              Apply For Position <i class="fa-solid fa-arrow-right-long ml-1 text-[10px]"></i>
            </button>
          `;
          grid.appendChild(card);
        });
      } catch (err) {
        grid.innerHTML = `
          <div class="bg-red-50 border border-red-200 text-red-800 p-6 rounded-xl text-center shadow-sm">
            <i class="fa-solid fa-circle-exclamation text-2xl mb-2 block text-red-500"></i>
            Backend connection barrier. Make sure your server at port 5000 is active.
          </div>`;
      }
    }
    window.addEventListener('DOMContentLoaded', executeLiveFetch);
  </script>
</body>
</html>
